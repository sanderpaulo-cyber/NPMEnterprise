name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  smoke-api:
    runs-on: ubuntu-latest
    needs: validate

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: networksentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d networksentinel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/networksentinel
      API_PORT: 8080
      WEB_PORT: 20112
      API_PROXY_TARGET: http://127.0.0.1:8080
      BASE_PATH: /
      ENABLE_DEMO_SEED: "false"
      NETWORK_POLLING_MODE: simulated
      DISCOVERY_MAX_HOSTS_PER_RUN: 256
      DISCOVERY_HOST_CONCURRENCY: 8
      LOG_LEVEL: info

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database schema
        run: pnpm --filter @workspace/db run push

      - name: Build API
        run: pnpm --filter @workspace/api-server run build

      - name: Start API
        run: pnpm --filter @workspace/api-server run start > api.log 2>&1 &

      - name: Wait for healthcheck
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/api/healthz; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          cat api.log
          exit 1
